    <style>
      /* Добавляем эффект звездного фона */
body {
  margin: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
  transition-duration: 1s ease-in-out;
  position: relative; /* Для позиционирования звезд */
}

/* Фоновые звезды */
.stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; /* Чтобы не мешали взаимодействию с другими элементами */
  z-index: -1; /* Помещаем их за основным контентом */
}

.star {
  position: absolute;
  background-color: white;
  border-radius: 50%;
  opacity: 0.2; /* Прозрачность 20% */
  animation: twinkle 5s infinite alternate; /* Мерцание */
}

/* Анимация мерцания для звезд */
@keyframes twinkle {
  0% {
    opacity: 0.2;
  }
  100% {
    opacity: 0.4;
  }
}

/* Движущиеся точки, летящие вверх */
.flying-stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; /* Чтобы не мешали взаимодействию с другими элементами */
  z-index: -1; /* Помещаем их за основным контентом */
}

.flying-star {
  position: absolute;
  background-color: white;
  border-radius: 50%;
  opacity: 0.8; /* Более яркие, чем фоновые звезды */
  animation: flyUp 5s linear infinite; /* Летят вверх */
}

/* Анимация движения вверх */
@keyframes flyUp {
  0% {
    transform: translateY(100vh);
    opacity: 0.8;
  }
  100% {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
      #coins {
            font-size: 55px;
            font-weight: bold;
            position: absolute;
            top: 7%; /* Можно изменить на нужное значение */
            right: 10%; /* Позиционируем элемент справа */

}

    <script>
      const tg = window.Telegram.WebApp;

      const cube = document.getElementById('cube');

      function getRandomInt(min, max) {

      }
      function updateCoins(amount) {
          coins += amount;
          coinsDisplay.textContent = `${coins} $LUCU`;
      }
      function updateBestLuck() {
          const min = 0.0000000000001;
          const max = 1000;
          let randomLuck = Math.random() * (max - min) + min;
          if (randomLuck > 1) {
              randomLuck = Math.round(randomLuck);
          }
          if (bestLuck === null || randomLuck < bestLuck) {
              bestLuck = randomLuck;
              const formattedLuck = formatNumber(bestLuck);
              bestLuckDisplay.textContent = `Your Best MIN Luck: ${formattedLuck}`;
              adjustFontSizeToFit(bestLuckDisplay);
          }
      }
      function formatNumber(number) {
          if (number >= 1) {
              return Math.round(number);
          }
          const str = number.toString();
          let significantDigits = '';
          let count = 0;
          for (let i = 0; i < str.length; i++) {
              const char = str[i];
              if (char === '0' || char === '.') {
                  significantDigits += char;
              } else {
                  significantDigits += char;
                  count++;
                  if (count === 4) break;
              }
          }
          return significantDigits;
      }
      const skinsMenu = document.getElementById('skins-menu');

          if (e.target === skinsMenu) {

      });
      buyNegativeButton.addEventListener('click', () => {
          if (!hasBoughtNegative) {

      function adjustFontSizeToFit(element) {
          const parentWidth = element.parentElement.offsetWidth;
          let fontSize = 35;
          element.style.fontSize = `${fontSize}px`;
          while (element.scrollWidth > parentWidth && fontSize > 5) {
              fontSize -= 1;
              element.style.fontSize = `${fontSize}px`;

      // Генерация фоновых звезд
function createStars(containerClass, starClass, count) {
  const container = document.querySelector(`.${containerClass}`);
  for (let i = 0; i < count; i++) {
    const star = document.createElement("div");
    star.classList.add(starClass);

    // Случайный размер
    const size = Math.random() * 3 + 1; // От 1 до 4 пикселей
    star.style.width = `${size}px`;
    star.style.height = `${size}px`;

    // Случайное положение
    star.style.top = `${Math.random() * 100}%`;
    star.style.left = `${Math.random() * 100}%`;

    container.appendChild(star);
  }
}

// Создаем 50 фоновых звезд
createStars("stars", "star", 50);

// Создаем 10 движущихся звезд
createStars("flying-stars", "flying-star", 10);
