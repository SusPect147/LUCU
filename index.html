<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cube Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      transition: background 1s ease-in-out;
    }

    #coins {
      font-size: 2rem;
      font-weight: bold;
      position: absolute;
      top: 10px;
      left: 10px;
      color: rgb(58, 58, 58);
    }

    #cube {
      width: 300px;
      height: 300px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.3s;
      -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
      outline: none;
    }

    .gray-gradient {
      background: linear-gradient(
        217deg,
        rgba(218, 218, 218, 0.8),
        rgba(255, 0, 0, 0) 70.71%
      ),
      linear-gradient(127deg, rgba(43, 43, 43, 0.8), rgba(0, 255, 0, 0) 70.71%),
      linear-gradient(336deg, rgba(105, 105, 105, 0.8), rgba(0, 0, 255, 0) 70.71%);
    }

    .pink-gradient {
      background: linear-gradient(
        217deg,
        rgba(255, 0, 0, 0.8),
        rgba(255, 0, 0, 0) 70.71%
      ),
      linear-gradient(127deg, rgba(0, 255, 0, 0.8), rgba(0, 255, 0, 0) 70.71%),
      linear-gradient(336deg, rgba(0, 0, 255, 0.8), rgba(0, 0, 255, 0) 70.71%);
    }

    #progressBar {
      position: absolute;
      bottom: 25%;
      width: 80%;
      height: 10px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      overflow: hidden;
    }

    #progressBar div {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #ff9ceb, #ff3cb8);
    }

    @keyframes loading {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }

    .menu {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: #f5f5f5;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #555;
      text-align: center;
    }

    .menu-item img {
      width: 40px;
      height: 40px;
      margin-bottom: 5px;
    }

    .menu-item:hover {
      color: #000;
    }
    @keyframes sparkle {
  0% {
    transform: scale(0.5);
    opacity: 0;
  }
  50% {
    transform: scale(1);
    opacity: 1;
  }
  100% {
    transform: scale(0.5);
    opacity: 0;
  }
}

.sparkle {
  position: absolute;
  background: rgb(255, 255, 255);
  width: 5px;
  height: 5px;
  border-radius: 50%;
  animation: sparkle 2s infinite;
}
  </style>
</head>
<body class="gray-gradient">
  <div id="coins">0 $LUCU</div>
  <div id="progressBar"><div></div></div>
  <img id="cube" src="начальный кубик.gif" alt="Cube">

  <div class="menu">
    <div class="menu-item">
      <img src="друзья.png" alt="Friends">
      Friends
    </div>
    <div class="menu-item">
      <img src="квесты.png" alt="Quests">
      Quests
    </div>
    <div class="menu-item">
      <img src="таблица лидеров.png" alt="Leaderboard">
      Leader Board
    </div>
  </div>

  <script>
    const cube = document.getElementById('cube');
    const coinsDisplay = document.getElementById('coins');
    const progressBar = document.querySelector('#progressBar div');
    let coins = 0;
    let isAnimating = false;

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function updateCoins(amount) {
      coins += amount;
      coinsDisplay.textContent = `${coins} $LUCU`;
    }

    function startProgress(duration) {
      progressBar.style.transition = `width ${duration}s linear`;
      progressBar.style.width = '100%';
      setTimeout(() => {
        progressBar.style.transition = 'none';
        progressBar.style.width = '0%';
      }, duration * 1000);
    }

    function rollCube() {
  let isRainbow = Math.random() < 0.2;
  document.body.className = isRainbow ? 'pink-gradient' : 'gray-gradient';
  cube.src = isRainbow ? 'супер начальный кубик.gif' : 'начальный кубик.gif';

  cube.onclick = async () => {
    if (isAnimating) return;
    isAnimating = true;
    startProgress(3); // 3 seconds cooldown

    let random = Math.random() * 100;
    let outcome;

    if (isRainbow) {
      if (random < 15) outcome = { src: '1-кубик.gif', coins: 2 };
      else if (random < 45) outcome = { src: '2-кубик.gif', coins: 4 };
      else if (random < 70) outcome = { src: '3-кубик.gif', coins: 6 };
      else if (random < 85) outcome = { src: '4-кубик.gif', coins: 8 };
      else if (random < 94) outcome = { src: '5-кубик.gif', coins: 10 };
      else outcome = { src: '6-кубик.gif', coins: 12 };
    } else if (cube.src.includes('супер начальный кубик.gif')) {
      // Условие для "супер начального кубика"
      if (random < 40) outcome = { src: '1-кубик.gif', coins: 2 };
      else if (random < 65) outcome = { src: '2-кубик.gif', coins: 4 };
      else if (random < 80) outcome = { src: '3-кубик.gif', coins: 6 };
      else if (random < 90) outcome = { src: '4-кубик.gif', coins: 8 };
      else if (random < 97) outcome = { src: '5-кубик.gif', coins: 10 };
      else outcome = { src: '6-кубик.gif', coins: 12 };
    } else {
      // Условие для обычного кубика
      if (random < 40) outcome = { src: '1-кубик.gif', coins: 1 };
      else if (random < 65) outcome = { src: '2-кубик.gif', coins: 2 };
      else if (random < 80) outcome = { src: '3-кубик.gif', coins: 3 };
      else if (random < 90) outcome = { src: '4-кубик.gif', coins: 4 };
      else if (random < 97) outcome = { src: '5-кубик.gif', coins: 5 };
      else outcome = { src: '6-кубик.gif', coins: 6 };
    }

        // Show animation
        cube.src = outcome.src;
        await new Promise((resolve) => setTimeout(resolve, 1000)); // Wait for 1 second animation

        // Update coins after animation
        updateCoins(outcome.coins);

        setTimeout(() => {
          rollCube();
          isAnimating = false;
        }, 3000);
      };
    }

    rollCube();
    function spawnSparkles() {
  for (let i = 0; i < 50; i++) {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.style.left = Math.random() * window.innerWidth + "px";
    sparkle.style.top = Math.random() * window.innerHeight + "px";
    sparkle.style.animationDelay = Math.random() * 2 + "s";
    document.body.appendChild(sparkle);
  }
}
spawnSparkles();
  </script>
</body>
</html>
